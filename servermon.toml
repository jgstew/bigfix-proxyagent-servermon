# bigfix-proxyagent-servermon configuration
#
# Each [[urls]] entry becomes one proxied device in BigFix, named after the
# URL with its scheme removed (https://example.com -> "example.com").
#
# How often each URL is checked is the "refresh interval" (minutes): a URL's
# own refresh_interval_minutes, else the [settings] default below, else 30.
# It is bounded to 1-10080 (one week). This only throttles checks; the Proxy
# Agent still drives how often the plugin runs at all
# ("DeviceReportRefreshIntervalMinutes" in settings.json).

[settings]
# Per-request timeout, seconds (can be overridden per URL).
timeout_seconds = 30
# Default check cadence for URLs without their own refresh_interval_minutes
# (minutes, bounded 1-10080; the built-in default is 30).
# refresh_interval_minutes = 30
# user_agent = "bigfix-proxyagent-servermon"

[[urls]]
url = "https://example.com"
# Optional: report failure unless this case-insensitive regex matches the
# response body or headers.
match = "Example Domain"
# Optional: report failure if this case-insensitive regex matches the
# response body or headers (reachable, but serving a known-bad page).
# no_match = "could not connect to( the)? database"

[[urls]]
url = "https://forum.bigfix.com/login"
refresh_interval_minutes = 360
match = "an account"

[[urls]]
url = "https://localhost:44444/fake.html"

[[urls]]
url = "http://localhost:888/"
refresh_interval_minutes = 30
match = "enter your username and password"
measure_network_hops = true

[[urls]]
url = "https://localhost/login"
refresh_interval_minutes = 30
no_match = "Could not connect to the BigFix database"
verify_tls = false
measure_network_hops = true

# [[urls]]
# url = "https://internal.example.local:8443/health"
# match = "\"status\": \"ok\""
# timeout_seconds = 10
# verify_tls = false   # for self-signed certs on internal servers
# # Only check this URL every N minutes (default: every Proxy Agent
# # refresh). Effectively rounds up to a multiple of the heartbeat
# # (DeviceReportRefreshIntervalMinutes in settings.json). Can also be set
# # from BigFix via the "set refresh interval <minutes>" action command.
# refresh_interval_minutes = 240
# # Estimate the network hop count to the server (TTL binary search over
# # plain TCP connects) on 1 in every 6 checks of this URL.
# measure_network_hops = true
